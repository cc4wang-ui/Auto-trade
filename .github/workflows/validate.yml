name: validate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pine:
    name: Pine Script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run validate_pine.py against every .pine
        run: |
          set -u
          fail=0
          shopt -s globstar nullglob
          files=( **/*.pine )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .pine files found — nothing to validate."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "::group::$f"
            if ! python3 scripts/validate_pine.py "$f"; then
              echo "::error file=$f::validate_pine.py reported errors"
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

  json-lint:
    name: JSON lint (TradersPost payload examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify every fenced json block in docs parses
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          fail = 0
          pattern = re.compile(r"```json\s*\n(.*?)\n```", re.DOTALL)
          for md in Path("docs").rglob("*.md"):
              text = md.read_text(encoding="utf-8")
              for i, block in enumerate(pattern.findall(text), start=1):
                  try:
                      json.loads(block)
                      print(f"OK   {md}#json[{i}]")
                  except json.JSONDecodeError as e:
                      print(f"FAIL {md}#json[{i}]: {e}")
                      fail = 1
          sys.exit(fail)
          PY

  secret-scan:
    name: Secret scan (basic webhook URL check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block accidental TradersPost webhook URL leaks
        run: |
          set -euo pipefail
          # Match real webhook URLs but allow the schema example "{uuid}/{password}"
          hits=$(grep -rEn \
            'https://webhooks\.traderspost\.io/trading/webhook/[a-f0-9-]{8,}' \
            --include='*.md' --include='*.pine' --include='*.py' --include='*.gs' --include='*.json' \
            . || true)
          if [ -n "$hits" ]; then
            echo "::error::Possible TradersPost webhook URL committed:"
            echo "$hits"
            exit 1
          fi
          echo "No live webhook URLs found."
